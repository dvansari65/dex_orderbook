services:
  postgres:
    image: postgres:15-alpine
    container_name: indexer
    restart: always
    environment:
      POSTGRES_USER: danish
      POSTGRES_PASSWORD: indexer
      POSTGRES_DB: indexer
    ports:
      - "5433:5432"
    volumes:
      - dex_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: indexer-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  dex_data:
  redis_data:
